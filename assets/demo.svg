  <text x="392" y="254" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#a9b1c3">curl ... | bash in .mcp.json:13</text>

  <rect x="34" y="286" width="912" height="48" rx="8" fill="#211d12" stroke="#7c5d13"/>
  <text x="54" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#ffd166">HIGH</text>
  <text x="154" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#f4f7fb">BROAD_FILESYSTEM_ACCESS</text>
  <text x="430" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#a9b1c3">filesystem server is scoped to /</text>

  <rect x="34" y="348" width="912" height="48" rx="8" fill="#211d12" stroke="#7c5d13"/>
  <text x="54" y="378" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#ffd166">HIGH</text>
  <text x="154" y="378" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#f4f7fb">SECRET_ENV_GRANTED</text>
